<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL WILL | Master Legacy Vault</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #020617; --accent: #2563eb; --solana: #14f195; 
            --glass: rgba(15, 23, 42, 0.9); --text: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background: #020617; color: var(--text); margin: 0; line-height: 1.6; }
        .nav { background: #0f172a; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; display: flex; align-items: center; gap: 10px; }
        .container { max-width: 850px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--glass); border-radius: 20px; padding: 2.5rem; border: 1px solid #1e293b; margin-bottom: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 1.1rem; color: var(--solana); display: flex; align-items: center; gap: 10px; text-transform: uppercase; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
        input, textarea, select { width: 100%; padding: 14px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn { padding: 15px 25px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wallet { background: #9945ff; color: white; width: auto; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-check { background: var(--solana); color: #020617; }
        .btn-portal { background: transparent; border: 1px solid #334155; color: #94a3b8; font-size: 0.8rem; margin-top: 20px; }
        .file-preview-list { background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #334155; }
        .hidden { display: none; }
        .countdown { font-size: 4rem; font-weight: 900; color: var(--solana); margin: 20px 0; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo"><i class="fa-solid fa-infinity"></i> DIGITAL WILL</div>
    <button class="btn btn-wallet" id="walletBtn" onclick="connectSolana()"><i class="fa-solid fa-wallet"></i> CONNECT WALLET</button>
</div>

<div class="container">
    
    <div id="setup-view">
        <div class="card">
            <h2><i class="fa-solid fa-user-lock"></i> 1. Security & Identity</h2>
            <div class="grid">
                <input type="password" id="masterKey" placeholder="Master Access Key (Min 8 chars)">
                <input type="email" id="ownerEmail" placeholder="Your Personal Email">
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-folder-open"></i> 2. Legacy Assets</h2>
            <div class="grid" style="margin-bottom: 15px;">
                <textarea id="bankInfo" rows="4" placeholder="Bank, Property, & Legal details"></textarea>
                <textarea id="digitalInfo" rows="4" placeholder="Crypto Seed Phrases & Logins"></textarea>
            </div>
            <label style="font-size: 0.75rem; opacity: 0.6;">UPLOAD DOCUMENTS (PDF, IMAGES, ETC.)</label>
            <input type="file" id="fileInput" multiple onchange="processFiles(this.files)" style="margin-top: 5px;">
            <div id="fileStatusList" class="file-preview-list hidden">
                <strong style="font-size: 0.8rem;">Ready for Encryption:</strong>
                <div id="fileItems"></div>
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-hourglass-start"></i> 3. Trigger & Beneficiary</h2>
            <div class="grid">
                <select id="triggerTime">
                    <option value="0.0014">2 Minutes (Fast Test)</option>
                    <option value="30">30 Days</option>
                    <option value="90">90 Days</option>
                    <option value="365">1 Year</option>
                </select>
                <input type="email" id="beneficiaryEmail" placeholder="Beneficiary Email (Nominee)">
            </div>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="sealVault()">SEAL MASTER VAULT</button>
            <button class="btn btn-portal" onclick="openPortal()">LEGACY ACCESS PORTAL</button>
        </div>
    </div>

    <div id="active-view" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="color: var(--solana); font-weight: bold; letter-spacing: 2px;">VAULT ACTIVE</div>
            <div id="timerDisplay" class="countdown">00</div>
            <p style="opacity: 0.7;">Time until automated legacy notification</p>
            <button class="btn btn-check" onclick="checkIn()"><i class="fa-solid fa-fingerprint"></i> PERFORM CHECK-IN</button>
            <button class="btn btn-portal" style="margin-top: 40px;" onclick="openPortal()">OPEN ACCESS PORTAL</button>
            <button class="btn" style="background: #450a0a; color: #f87171; margin-top: 15px;" onclick="wipeVault()">WIPE ALL DATA</button>
        </div>
    </div>

    <div id="portal-view" class="hidden">
        <div class="card">
            <h2 style="color: var(--accent);"><i class="fa-solid fa-key"></i> Legacy Access Center</h2>
            <p style="font-size: 0.9rem;">To unlock this vault, provide the legal Master Key provided by the owner.</p>
            <input type="file" id="proofDoc" style="margin-bottom: 15px;">
            <input type="password" id="unlockKey" placeholder="Enter Master Legacy Key">
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="unlockLegacy()"><i class="fa-solid fa-unlock"></i> UNLOCK VAULT</button>
            
            <div id="decrypted-area" class="hidden" style="margin-top: 25px; border-top: 2px solid var(--solana); padding-top: 20px;">
                <h3 style="color:var(--solana);">DECRYPTED ASSETS:</h3>
                <p id="viewText" style="white-space: pre-wrap; background: #0f172a; padding: 15px; border-radius: 10px;"></p>
                <div id="viewLinks" style="margin-top: 15px;"></div>
            </div>
            <button class="btn btn-portal" onclick="location.reload()">BACK TO DASHBOARD</button>
        </div>
    </div>
</div>

<script>
    // --- INTEGRATED CREDENTIALS ---
    const PUBLIC_KEY = "UjQcyAneLY2BmOV1Z";
    const SERVICE_ID = "service_andok0r";
    const TEMPLATE_ID = "template_3xoxzb9";

    (function(){
        emailjs.init(PUBLIC_KEY);
    })();

    let walletAddress = null;
    let fileBuffer = [];

    async function connectSolana() {
        if (window.solana) {
            const resp = await window.solana.connect();
            walletAddress = resp.publicKey.toString();
            const btn = document.getElementById('walletBtn');
            btn.innerText = walletAddress.slice(0,4) + "..." + walletAddress.slice(-4);
            btn.style.background = "#14f195";
            btn.style.color = "#000";
        } else { alert("Please install Phantom or Solflare wallet."); }
    }

    function processFiles(files) {
        fileBuffer = [];
        document.getElementById('fileStatusList').classList.remove('hidden');
        const items = document.getElementById('fileItems');
        items.innerHTML = "";
        
        for (let f of files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fileBuffer.push({ name: f.name, data: e.target.result });
                items.innerHTML += `<div style="padding: 4px 0; border-bottom: 1px solid #334155; font-size: 0.75rem;">✔️ ${f.name}</div>`;
            };
            reader.readAsDataURL(f);
        }
    }

    function sealVault() {
        const key = document.getElementById('masterKey').value;
        const email = document.getElementById('ownerEmail').value;
        const beneficiary = document.getElementById('beneficiaryEmail').value;

        if(key.length < 8 || !email || !beneficiary) { alert("Missing security details or short key."); return; }

        const rawData = {
            fin: document.getElementById('bankInfo').value,
            dig: document.getElementById('digitalInfo').value,
            files: fileBuffer
        };

        const encrypted = CryptoJS.AES.encrypt(JSON.stringify(rawData), key).toString();
        
        const config = {
            payload: encrypted,
            owner: email,
            beneficiary: beneficiary,
            interval: parseFloat(document.getElementById('triggerTime').value) * 24 * 60 * 60 * 1000,
            lastActive: Date.now(),
            triggered: false
        };

        localStorage.setItem('digital_will_master_v4', JSON.stringify(config));
        alert("Vault successfully sealed. Countdown started.");
        render();
    }

    function render() {
        const stored = localStorage.getItem('digital_will_master_v4');
        if(stored) {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('active-view').classList.remove('hidden');
            const config = JSON.parse(stored);
            
            const msRemaining = (config.lastActive + config.interval) - Date.now();
            
            if(msRemaining <= 0 && !config.triggered) {
                sendLegacyEmail(config);
            }

            const minsLeft = Math.ceil(msRemaining / (1000 * 60));
            const daysLeft = Math.ceil(msRemaining / (1000 * 60 * 60 * 24));
            
            document.getElementById('timerDisplay').innerText = config.interval < 3600000 ? minsLeft + "m" : daysLeft + "d";
        }
    }

    function sendLegacyEmail(config) {
        config.triggered = true;
        localStorage.setItem('digital_will_master_v4', JSON.stringify(config));

        const params = {
            beneficiary_email: config.beneficiary,
            owner_email: config.owner,
            message: "The Digital Will inactivity trigger has been activated. Please use your provided key to access the vault."
        };

        emailjs.send(SERVICE_ID, TEMPLATE_ID, params)
            .then(() => { alert("LEGACY TRIGGERED: Email sent to beneficiary."); })
            .catch((err) => { console.error("EmailJS Error:", err); });
    }

    function checkIn() {
        let config = JSON.parse(localStorage.getItem('digital_will_master_v4'));
        config.lastActive = Date.now();
        config.triggered = false;
        localStorage.setItem('digital_will_master_v4', JSON.stringify(config));
        alert("Heartbeat confirmed. Timer reset.");
        render();
    }

    function openPortal() {
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('active-view').classList.add('hidden');
        document.getElementById('portal-view').classList.remove('hidden');
    }

    function unlockLegacy() {
        const key = document.getElementById('unlockKey').value;
        const proof = document.getElementById('proofDoc').files[0];
        if(!proof || !key) { alert("Proof document and Master Key are mandatory."); return; }

        const config = JSON.parse(localStorage.getItem('digital_will_master_v4'));
        try {
            const bytes = CryptoJS.AES.decrypt(config.payload, key);
            const decrypted = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

            document.getElementById('decrypted-area').classList.remove('hidden');
            document.getElementById('viewText').innerText = `[FINANCIAL ASSETS]\n${decrypted.fin}\n\n[DIGITAL LOGINS]\n${decrypted.dig}`;
            
            const links = document.getElementById('viewLinks');
            links.innerHTML = "<h4 style='color:var(--solana)'>ATTACHED FILES:</h4>";
            decrypted.files.forEach(f => {
                links.innerHTML += `<a href="${f.data}" download="${f.name}" style="color:var(--text); text-decoration:none; display:block; margin:8px 0; padding:10px; background:#1e293b; border-radius:8px;">📁 Download ${f.name}</a>`;
            });
        } catch (e) { alert("Access Denied: Incorrect Master Key."); }
    }

    function wipeVault() {
        if(confirm("Are you sure? This will delete all encrypted data forever.")) {
            localStorage.removeItem('digital_will_master_v4');
            location.reload();
        }
    }

    window.onload = render;
    setInterval(render, 30000); 
</script>

</body>
</html>
